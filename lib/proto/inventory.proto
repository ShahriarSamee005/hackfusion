syntax = "proto3";
package delta.v1;
option go_package = "github.com/mumtahina22/delta/gen/go;deltav1";

import "google/protobuf/timestamp.proto";



message VectorClock {
  map<string, uint64> clocks = 1;
}

message NodeIdentity {
  string   node_id    = 1;
  string   region     = 2;
  NodeType type       = 3;
  bytes    pubkey_der = 4;

  enum NodeType {
    VOLUNTEER = 0;
    BOAT      = 1;
    DRONE     = 2;
    BASE_CAMP = 3;
  }
}

message SupplyItem {
  string                    item_id       = 1;
  string                    name          = 2;
  int32                     quantity      = 3;
  string                    unit          = 4;
  string                    location_id   = 5;
  google.protobuf.Timestamp last_modified = 6;
  string                    modified_by   = 7;
  VectorClock               clock         = 8;
  bytes                     signature     = 9;
}

message InventoryState {
  repeated SupplyItem items     = 1;
  repeated string     tombstone = 2;
  VectorClock         clock     = 3;
  string              shard_id  = 4;
}
