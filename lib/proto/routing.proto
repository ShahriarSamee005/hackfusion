syntax = "proto3";
package delta.v1;
option go_package = "github.com/mumtahina22/delta/gen/go;deltav1";

import "inventory.proto";

message RouteEdge {
  string from_node_id  = 1;
  string to_node_id    = 2;
  float  base_weight   = 3;
  float  decay_weight  = 4;
  bool   passable      = 5;
  float  flood_depth_m = 6;
}

message RouteRequest {
  string            origin_id      = 1;
  string            destination_id = 2;
  repeated string   waypoint_ids   = 3;
  VehicleConstraint vehicle        = 4;
  Priority          cargo_priority = 5;

  enum Priority          { P0 = 0; P1 = 1; P2 = 2; P3 = 3; }
  enum VehicleConstraint { ANY = 0; BOAT_ONLY = 1; DRONE_ONLY = 2; FOOT = 3; }
}

message RouteResponse {
  repeated string    node_ids    = 1;
  float              total_cost  = 2;
  float              eta_minutes = 3;
  float              decay_risk  = 4;
  repeated RouteEdge edges       = 5;
  VectorClock        clock       = 6;
}